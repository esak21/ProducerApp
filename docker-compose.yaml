services:
  spark-master:
    container_name: edm-spark-master
    build: .
    image: edm-spark-image
    volumes:
      - ./book_data:/app/data
      - spark-logs:/opt/spark/spark-events
    env_file:
      - .env.spark
    ports:
      - '9090:9090'
      - '7077:7077'
  spark-worker:
    #    container_name: da-spark-worker
    image: edm-spark-image
    depends_on:
      - spark-master
    env_file:
      - .env.spark
    volumes:
      - ./book_data:/app/data
      - spark-logs:/opt/spark/spark-events

volumes:
  spark-logs:
